name: Daily Stock & News Update

on:
  schedule:
    - cron: '0 6 * * *'  # UTC 06:00 = KST 15:00 (after US market close)
  workflow_dispatch:       # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update stock data
        run: python scripts/update-stocks.py

      - name: Update news
        run: python scripts/update-news.py

      - name: Build compact context
        run: python scripts/data_compact.py

      - name: Generate daily briefing
        if: env.ANTHROPIC_API_KEY != ''
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POW_MODEL: claude-haiku-4-5
        run: |
          pip install anthropic
          python scripts/generate-briefing.py

      - name: Generate og:images
        run: python scripts/generate-og.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json data/conflicts.json data/context-compact.json data/briefing.json public/og.png public/og-*.png || true
          git diff --cached --quiet || git commit -m "chore: daily stock/news/briefing/og update $(date +%Y-%m-%d)"
          git push
